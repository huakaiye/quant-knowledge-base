<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1350" viewBox="0 0 1800 1350">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 38px; font-weight: 700; fill: #172033; }
      .subtitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 22px; fill: #526071; }
      .root { fill: #172033; stroke: #172033; stroke-width: 2; }
      .rootText { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #ffffff; }
      .box { stroke-width: 2; rx: 14; ry: 14; }
      .boxTitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #172033; }
      .boxText { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 18px; fill: #263447; }
      .small { font-size: 16px; fill: #4b5a6b; }
      .line { stroke: #7b8796; stroke-width: 3; fill: none; }
      .dashed { stroke-dasharray: 8 8; }
      .badge { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
      .ok { fill: #0f766e; }
      .warn { fill: #b45309; }
      .no { fill: #b91c1c; }
      .candidate { fill: #4338ca; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1350"/>
  <text class="title" x="70" y="72">双池轮动当前实盘组合思维导图</text>
  <text class="subtitle" x="70" y="110">当前默认：A2-slope004 + B3 gate + tiered-v2 + hard5；A23 是研究候选，暂不切生产</text>

  <rect class="root" x="670" y="165" width="460" height="92" rx="22" ry="22"/>
  <text class="rootText" x="736" y="205">ETF双池当前实盘组合</text>
  <text class="rootText" x="759" y="238">选强势ETF + 分层控风险</text>

  <path class="line" d="M900 257 C900 315 235 315 235 370"/>
  <path class="line" d="M900 257 C900 315 610 315 610 370"/>
  <path class="line" d="M900 257 C900 315 995 315 995 370"/>
  <path class="line" d="M900 257 C900 315 1370 315 1370 370"/>

  <rect class="box" x="70" y="370" width="330" height="300" fill="#e0f2fe" stroke="#0284c7"/>
  <text class="boxTitle" x="100" y="410">1. 动量打分</text>
  <text class="boxText" x="100" y="450">数学计算：</text>
  <text class="boxText" x="120" y="480">slope = 近端价格趋势斜率</text>
  <text class="boxText" x="120" y="510">annual_ret = exp(slope × 250) - 1</text>
  <text class="boxText" x="120" y="540">score = annual_ret × R²</text>
  <text class="boxText" x="100" y="585">候选准入：</text>
  <text class="boxText" x="120" y="615">score &lt;= 0：剔除</text>
  <text class="boxText" x="120" y="645">0 &lt; score &lt; 5：有效候选</text>

  <rect class="box" x="445" y="370" width="330" height="300" fill="#ecfdf5" stroke="#059669"/>
  <text class="boxTitle" x="475" y="410">2. A2-slope004</text>
  <text class="boxText" x="475" y="450">通俗解释：</text>
  <text class="boxText" x="495" y="480">旧仓还不错时，不急着换</text>
  <text class="boxText" x="495" y="510">降低追高和噪声交易</text>
  <text class="boxText" x="475" y="555">数学判断：</text>
  <text class="boxText" x="495" y="585">市场环境门控达标</text>
  <text class="boxText" x="495" y="615">旧仓短斜率仍可接受</text>
  <text class="boxText" x="495" y="645">新标的优势不够大时保留旧仓</text>

  <rect class="box" x="820" y="370" width="350" height="300" fill="#fff7ed" stroke="#ea580c"/>
  <text class="boxTitle" x="850" y="410">3. B3 gate</text>
  <text class="boxText" x="850" y="450">通俗解释：</text>
  <text class="boxText" x="870" y="480">ETF池整体转弱时不满仓硬冲</text>
  <text class="boxText" x="850" y="525">数学判断：</text>
  <text class="boxText" x="870" y="555">all_weak 持续</text>
  <text class="boxText" x="870" y="585">cum_days 达到阈值</text>
  <text class="boxText" x="870" y="615">median_ret &lt;= 0 或 MA20广度偏低</text>
  <text class="boxText" x="850" y="650">普通触发：risk_cap = 80%</text>

  <rect class="box" x="1215" y="370" width="515" height="300" fill="#f5f3ff" stroke="#7c3aed"/>
  <text class="boxTitle" x="1245" y="410">4. tiered-v2 分层风险预算</text>
  <text class="boxText" x="1245" y="450">strong risk：</text>
  <text class="boxText" x="1265" y="480">cum_days ≥ 10，median_ret &lt;= 0，top5_exhausted ≥ 4</text>
  <text class="boxText" x="1265" y="510">结果：risk_cap = 70%</text>
  <text class="boxText" x="1245" y="555">extreme risk：</text>
  <text class="boxText" x="1265" y="585">strong 成立，且 median_ret &lt;= -1.5%</text>
  <text class="boxText" x="1265" y="615">或 MA20广度 &lt;= 25%，top5_exhausted ≥ 4</text>
  <text class="boxText" x="1265" y="645">结果：risk_cap = 60%</text>

  <path class="line" d="M235 670 C235 735 235 735 235 780"/>
  <path class="line" d="M610 670 C610 735 610 735 610 780"/>
  <path class="line" d="M995 670 C995 735 995 735 995 780"/>
  <path class="line" d="M1472 670 C1472 735 1472 735 1472 780"/>

  <rect class="box" x="70" y="780" width="330" height="195" fill="#ffffff" stroke="#94a3b8"/>
  <rect class="ok" x="100" y="810" width="76" height="28" rx="14" ry="14"/>
  <text class="badge" x="121" y="830">保留</text>
  <text class="boxText" x="100" y="870">hard5 评价：</text>
  <text class="boxText" x="120" y="900">保守但仍必要</text>
  <text class="boxText" x="120" y="930">直接硬删偏粗</text>
  <text class="boxText" x="120" y="960">但 hard6 / gate6 尚未证明更好</text>

  <rect class="box" x="445" y="780" width="330" height="195" fill="#ffffff" stroke="#94a3b8"/>
  <rect class="ok" x="475" y="810" width="76" height="28" rx="14" ry="14"/>
  <text class="badge" x="496" y="830">保留</text>
  <text class="boxText" x="475" y="870">A2 评价：</text>
  <text class="boxText" x="495" y="900">有用，但不是主风控</text>
  <text class="boxText" x="495" y="930">更像进攻端抗抖</text>
  <text class="boxText" x="495" y="960">减少乱换仓</text>

  <rect class="box" x="820" y="780" width="350" height="195" fill="#ffffff" stroke="#94a3b8"/>
  <rect class="ok" x="850" y="810" width="76" height="28" rx="14" ry="14"/>
  <text class="badge" x="871" y="830">保留</text>
  <text class="boxText" x="850" y="870">B3 评价：</text>
  <text class="boxText" x="870" y="900">防守骨架有效</text>
  <text class="boxText" x="870" y="930">比裸A2回撤更浅</text>
  <text class="boxText" x="870" y="960">适合继续做实盘日志审计</text>

  <rect class="box" x="1215" y="780" width="515" height="195" fill="#ffffff" stroke="#94a3b8"/>
  <rect class="ok" x="1245" y="810" width="76" height="28" rx="14" ry="14"/>
  <text class="badge" x="1266" y="830">保留</text>
  <text class="boxText" x="1245" y="870">tiered-v2 评价：</text>
  <text class="boxText" x="1265" y="900">当前最认可的实盘风控层</text>
  <text class="boxText" x="1265" y="930">相对 A2：收益更高，回撤更浅</text>
  <text class="boxText" x="1265" y="960">但 cap60 样本仍需继续观察</text>

  <rect class="box" x="70" y="1040" width="520" height="235" fill="#fef2f2" stroke="#dc2626"/>
  <text class="boxTitle" x="100" y="1080">为什么不是简单替代组合</text>
  <text class="boxText" x="100" y="1120">hard6：score &lt; 6，2024 与 2025_20260519 弱于 hard5</text>
  <text class="boxText" x="100" y="1150">quality_gate6：2024 收益高但回撤不优，2025 明显弱于 hard5</text>
  <text class="boxText" x="100" y="1180">A19：2025 有效，但 2022_2023 失败</text>
  <text class="boxText" x="100" y="1210">A20：2025 强，但 2020_2021 收益和回撤输给 hard5</text>
  <text class="boxText" x="100" y="1240">A21：继续加阈值后更差，显示后验调参风险</text>

  <rect class="box" x="640" y="1040" width="520" height="235" fill="#eef2ff" stroke="#4f46e5"/>
  <text class="boxTitle" x="670" y="1080">下一代候选：A23 92/4/d09</text>
  <text class="boxText" x="670" y="1120">普通高分：不直接删除，给 70% 风险预算</text>
  <text class="boxText" x="670" y="1150">broad blowoff：广度 ≥ 92%，median_ret ≥ 4%，dispersion ≥ 9%</text>
  <text class="boxText" x="670" y="1180">触发时：risk_cap = 60%</text>
  <text class="boxText" x="670" y="1210">当前评价：首选研究候选，但不是生产默认</text>
  <text class="boxText" x="670" y="1240">缺口：成本扰动、cap邻近、完整邻域、forward OOS</text>

  <rect class="box" x="1210" y="1040" width="520" height="235" fill="#f0fdfa" stroke="#0f766e"/>
  <text class="boxTitle" x="1240" y="1080">主控结论</text>
  <text class="boxText" x="1240" y="1120">当前实盘组合：稳妥、边界清楚、可回滚</text>
  <text class="boxText" x="1240" y="1150">hard5：保守但暂时必要</text>
  <text class="boxText" x="1240" y="1180">B3 + tiered-v2：当前最可靠的防守层</text>
  <text class="boxText" x="1240" y="1210">A23：最有潜力，但必须补完稳健性</text>
  <text class="boxText" x="1240" y="1240">生产切换前：不得修改默认 max_score=5</text>
</svg>
