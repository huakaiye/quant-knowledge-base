<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1420" viewBox="0 0 1900 1420">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 42px; font-weight: 700; fill: #172033; }
      .subtitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 22px; fill: #526071; }
      .root { fill: #172033; stroke: #172033; stroke-width: 2; }
      .rootText { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #ffffff; }
      .box { stroke-width: 3; rx: 12; ry: 12; }
      .boxTitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 25px; font-weight: 700; fill: #172033; }
      .boxText { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 19px; fill: #263447; }
      .small { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 17px; fill: #4b5a6b; }
      .line { stroke: #7b8796; stroke-width: 4; fill: none; }
      .footer { fill: #ffffff; stroke: #64748b; stroke-width: 3; rx: 16; ry: 16; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1420"/>
  <text class="title" x="95" y="78">双池轮动当前实盘组合思维导图</text>
  <text class="subtitle" x="95" y="118">只针对当前实盘默认：A2-slope004 + B3 gate + tiered-v2 + hard5；A23 属于另线研究，不纳入本图</text>

  <rect class="root" x="665" y="165" width="630" height="120" rx="24" ry="24"/>
  <text class="rootText" x="762" y="215">当前实盘默认组合</text>
  <text class="rootText" x="725" y="258">选强势 ETF，同时控制过热、弱市和换仓噪声</text>

  <path class="line" d="M980 285 C980 345 260 345 260 405"/>
  <path class="line" d="M980 285 C980 345 690 345 690 405"/>
  <path class="line" d="M980 285 C980 345 1110 345 1110 405"/>
  <path class="line" d="M980 285 C980 345 1540 345 1540 405"/>

  <rect class="box" x="70" y="405" width="380" height="330" fill="#e0f2fe" stroke="#0284c7"/>
  <text class="boxTitle" x="105" y="450">1. hard5 动量筛选</text>
  <text class="boxText" x="105" y="495">数学计算：</text>
  <text class="boxText" x="125" y="528">annual_ret = exp(slope × 250) - 1</text>
  <text class="boxText" x="125" y="561">score = annual_ret × R²</text>
  <text class="boxText" x="105" y="606">判断：</text>
  <text class="boxText" x="125" y="639">score &lt;= 0：剔除</text>
  <text class="boxText" x="125" y="672">0 &lt; score &lt; 5：有效候选</text>
  <text class="boxText" x="125" y="705">score &gt;= 5：按过热异常剔除</text>

  <rect class="box" x="500" y="405" width="380" height="330" fill="#ecfdf5" stroke="#059669"/>
  <text class="boxTitle" x="535" y="450">2. A2-slope004 换仓</text>
  <text class="boxText" x="535" y="495">通俗判断：</text>
  <text class="boxText" x="555" y="528">旧仓还不错时，不急着换</text>
  <text class="boxText" x="555" y="561">新标的必须明显更强才替换</text>
  <text class="boxText" x="535" y="606">数学门槛：</text>
  <text class="boxText" x="555" y="639">breadth ≥ 72%，median_ret ≥ 6%</text>
  <text class="boxText" x="555" y="672">dispersion ≥ 9%，avg_R² ≥ 46%</text>
  <text class="boxText" x="555" y="705">新旧 slope10 优势 ≤ 0.004</text>

  <rect class="box" x="930" y="405" width="380" height="330" fill="#fff7ed" stroke="#ea580c"/>
  <text class="boxTitle" x="965" y="450">3. B3 gate 风险闸门</text>
  <text class="boxText" x="965" y="495">通俗判断：</text>
  <text class="boxText" x="985" y="528">ETF 池持续全弱时，不满仓硬冲</text>
  <text class="boxText" x="965" y="573">触发条件：</text>
  <text class="boxText" x="985" y="606">all_weak 持续</text>
  <text class="boxText" x="985" y="639">cum_days ≥ 10</text>
  <text class="boxText" x="985" y="672">median_ret ≤ 0 或 MA20广度 ≤ 40%</text>
  <text class="boxText" x="965" y="705">动作：risk_cap = 80%</text>

  <rect class="box" x="1360" y="405" width="470" height="330" fill="#f5f3ff" stroke="#7c3aed"/>
  <text class="boxTitle" x="1395" y="450">4. tiered-v2 分层仓位</text>
  <text class="boxText" x="1395" y="495">strong risk：</text>
  <text class="boxText" x="1415" y="528">cum_days ≥ 10，median_ret ≤ 0</text>
  <text class="boxText" x="1415" y="561">top5_exhausted ≥ 4 → cap 70%</text>
  <text class="boxText" x="1395" y="606">extreme risk：</text>
  <text class="boxText" x="1415" y="639">median_ret ≤ -1.5% 或广度 ≤ 25%</text>
  <text class="boxText" x="1415" y="672">且 top5_exhausted ≥ 4 → cap 60%</text>
  <text class="boxText" x="1395" y="705">动作：弱市越深，仓位越低</text>

  <path class="line" d="M260 735 C260 800 260 800 260 865"/>
  <path class="line" d="M690 735 C690 800 690 800 690 865"/>
  <path class="line" d="M1110 735 C1110 800 1110 800 1110 865"/>
  <path class="line" d="M1540 735 C1540 800 1540 800 1540 865"/>

  <rect class="box" x="70" y="865" width="500" height="235" fill="#ffffff" stroke="#0284c7"/>
  <text class="boxTitle" x="105" y="910">当前默认开关</text>
  <text class="boxText" x="105" y="952">ENABLE_A2_SLOPE004 = 1</text>
  <text class="boxText" x="105" y="985">ENABLE_B3_GATE_MOB_CAP80 = 1</text>
  <text class="boxText" x="105" y="1018">ENABLE_B3_GATE_TIERED_V2 = 1</text>
  <text class="boxText" x="105" y="1051">ENABLE_B3_GATE_TIERED_V2_SHADOW = 0</text>
  <text class="boxText" x="105" y="1084">score_hot_filter_mode = hard_cap，MAX_SCORE = 5</text>

  <rect class="box" x="620" y="865" width="520" height="235" fill="#ffffff" stroke="#059669"/>
  <text class="boxTitle" x="655" y="910">本轮只优化当前实盘持仓方式</text>
  <text class="boxText" x="655" y="952">实验：A2 旧仓衰减退出，ID = SAK6</text>
  <text class="boxText" x="655" y="985">ret3 ≥ -3%，ret5 ≥ -2%</text>
  <text class="boxText" x="655" y="1018">drawdown10 ≤ 8%，slope5 ≥ -0.002</text>
  <text class="boxText" x="655" y="1051">slope5 - slope10 ≥ -0.012</text>
  <text class="boxText" x="655" y="1084">预期：MDD 改善 0.5-1.0pp，收益保留率 ≥ 97%</text>

  <rect class="box" x="1190" y="865" width="640" height="235" fill="#ffffff" stroke="#64748b"/>
  <text class="boxTitle" x="1225" y="910">为什么目前不是别的组合</text>
  <text class="boxText" x="1225" y="952">A2 单独运行：换仓更稳，但不是完整风控。</text>
  <text class="boxText" x="1225" y="985">hard6 / quality_gate6：边界更松，近端证据不够稳。</text>
  <text class="boxText" x="1225" y="1018">A19 / A20 / A21：有局部亮点，但跨段不足以改默认。</text>
  <text class="boxText" x="1225" y="1051">A22 / A23：属于 score-cap 替代研究，未完成生产证据。</text>
  <text class="boxText" x="1225" y="1084">所以当前实盘仍保留 hard5 + tiered-v2 这条清晰链路。</text>

  <rect class="footer" x="210" y="1210" width="1480" height="120"/>
  <text class="boxTitle" x="250" y="1260">主控评价</text>
  <text class="boxText" x="410" y="1250">当前组合的优点是稳、边界清楚、可审计；短板是 hard5 对极端行情的处理偏粗，A2 旧仓保留可能慢半拍。</text>
  <text class="boxText" x="410" y="1288">下一步只针对当前实盘链路测试 A2 衰减退出；formal 结果出来前，任何新规则都不得写入默认实盘。</text>

  <text class="small" x="95" y="1370">生成位置：03_策略档案/assets/VIS-20260606T123400Z-main-MAP1_双池轮动当前实盘组合思维导图.svg</text>
</svg>
